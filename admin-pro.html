<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Player TV - con borrado múltiple en Películas + Importador M3U</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #f5c518; --bg: #0f0f0f; --card: #1a1a1a; --blue: #2196F3; --red: #f44336; --green: #4CAF50; --border: #232c3d; --purple: #9c27b0; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; padding-bottom: 90px; }
        
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--gold); text-align: center; box-shadow: 0 0 20px rgba(245, 197, 24, 0.2); }
        .login-box input { padding: 12px; width: 220px; border-radius: 5px; border: 1px solid #333; background: #000; color: white; text-align: center; margin-bottom: 15px; outline: none; }
        .login-box button { background: var(--gold); border: none; padding: 12px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; }

        .search-box { width: 100%; max-width: 500px; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; border-left: 4px solid var(--gold); outline: none; display: block; margin: 0 auto 20px; }
        .nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .nav button { background: #222; border: 1px solid #444; color: white; cursor: pointer; padding: 10px 15px; border-radius: 5px; font-size: 11px; font-weight: bold; transition: 0.3s; }
        .nav button.active { background: var(--gold); color: black; border-color: var(--gold); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 15px; }
        .card-container { background: var(--card); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        .card-header { display: flex; align-items: center; padding: 12px; gap: 12px; }
        
        .img-wrapper { width: 80px; height: 60px; display: flex; align-items: center; justify-content: center; background: #000; border-radius: 6px; overflow: hidden; border: 1px solid #333; }
        .img-simple { width: 100%; height: 100%; object-fit: cover; }
        .img-dual { width: 45%; height: 90%; object-fit: contain; }

        .card-info { flex: 1; min-width: 0; }
        .card-info h3 { margin: 0; font-size: 13px; color: var(--gold); text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-info p { margin: 3px 0 0; font-size: 11px; color: #888; }
        
        .action-btns { display: flex; gap: 5px; padding: 0 12px 12px; justify-content: flex-end; }
        .mini-btn { width: 32px; height: 32px; border: none; border-radius: 4px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: 0.2s; }
        .mini-btn:hover { opacity: 0.8; transform: scale(1.1); }

        /* Estilos para selección múltiple */
        .selection-bar { background: #2c2c2c; padding: 10px; margin-bottom: 15px; border-radius: 8px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .selection-bar label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .card-checkbox { position: absolute; top: 8px; left: 8px; z-index: 10; width: 20px; height: 20px; cursor: pointer; accent-color: var(--gold); }
        .card-container.select-mode .card-checkbox { display: block; }
        
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 15px; width: 100%; max-width: 480px; border: 1px solid var(--gold); max-height: 90vh; overflow-y: auto; }
        .modal-group { margin-bottom: 12px; }
        .modal-group label { display: block; font-size: 10px; color: var(--gold); margin-bottom: 4px; text-transform: uppercase; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: white; border-radius: 6px; outline: none; box-sizing: border-box; }
        
        .poster-selector { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; }
        .poster-option { width: 70px; height: 100px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; object-fit: cover; }
        .poster-option.selected { border-color: var(--gold); }

        .btn-add-float { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: white; width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 99; }
        
        .fila-capitulo { display: grid; grid-template-columns: 1fr 1fr 40px; gap: 5px; margin-bottom: 8px; background: #222; padding: 8px; border-radius: 6px; border-left: 3px solid var(--blue); }
        .fila-capitulo input { font-size: 11px !important; padding: 6px !important; }
        
        .btn-delete-multi { background: var(--red); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-delete-multi:disabled { background: #555; cursor: not-allowed; }

        /* NUEVO: Estilos para el importador M3U */
        .import-section {
            background: #1e212e;
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid #3a3f5e;
        }
        .import-section h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: var(--gold);
        }
        .import-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .import-buttons button {
            background: #3a3f5e;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        .import-buttons button.primary {
            background: var(--green);
        }
        .m3u-textarea {
            width: 100%;
            height: 150px;
            background: #0a0c10;
            border: 1px solid #2a2e3f;
            color: #b9ffb0;
            font-family: monospace;
            font-size: 11px;
            padding: 8px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }
        .import-log {
            background: #0a0c10;
            border-radius: 8px;
            padding: 8px;
            font-family: monospace;
            font-size: 11px;
            max-height: 150px;
            overflow-y: auto;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1 style="color:var(--gold)">PLAYER TV ADMIN</h1>
        <input type="password" id="pass-input" placeholder="Contraseña">
        <button onclick="verificarPass()">ENTRAR</button>
    </div>
</div>

<div id="admin-panel" style="display:none;">
    <input type="text" id="buscador" class="search-box" placeholder="🔍 Buscar por título..." onkeyup="filtrar()">
    
    <div class="nav">
        <button onclick="cambiarCat('peliculas')" id="btn-peliculas">PELÍCULAS</button>
        <button onclick="cambiarCat('series')" id="btn-series">SERIES</button>
        <button onclick="cambiarCat('directos')" id="btn-directos">TV EN VIVO</button>
        <button onclick="cambiarCat('agenda')" id="btn-agenda">DEPORTES</button>
    </div>

    <!-- Barra de selección múltiple (solo visible en películas) -->
    <div id="selection-bar" style="display: none;" class="selection-bar">
        <label><input type="checkbox" id="select-all-checkbox"> Seleccionar todos</label>
        <button id="btn-delete-selected" class="btn-delete-multi" disabled>🗑️ Eliminar seleccionadas</button>
        <span id="selected-count" style="font-size:12px;">0 seleccionadas</span>
    </div>

    <!-- NUEVO: Sección importador M3U para Películas -->
    <div id="import-pelis-section" class="import-section" style="display: none;">
        <h3><i class="fa-solid fa-file-import"></i> Importar lista M3U (Películas)</h3>
        <div class="import-buttons">
            <button class="primary" onclick="mostrarImportador('peliculas')"><i class="fa-solid fa-code"></i> Pegar texto</button>
            <button onclick="document.getElementById('file-pelis').click()"><i class="fa-solid fa-upload"></i> Subir archivo .m3u</button>
            <input type="file" id="file-pelis" accept=".m3u,.txt" style="display:none" onchange="leerArchivoM3U(this, 'peliculas')">
        </div>
        <textarea id="m3u-pelis" class="m3u-textarea" placeholder="#EXTM3U&#10;#EXTINF:-1, The Matrix&#10;http://enlace.com/matrix.mp4"></textarea>
        <div class="import-buttons" style="margin-top: 5px;">
            <button onclick="procesarImportacionM3U('peliculas')" style="background:var(--green)">▶ Iniciar importación</button>
            <button onclick="cerrarImportador('peliculas')">Cancelar</button>
        </div>
        <div id="log-pelis" class="import-log"></div>
    </div>

    <!-- NUEVO: Sección importador M3U para Series -->
    <div id="import-series-section" class="import-section" style="display: none;">
        <h3><i class="fa-solid fa-file-import"></i> Importar lista M3U (Series)</h3>
        <div class="import-buttons">
            <button class="primary" onclick="mostrarImportador('series')"><i class="fa-solid fa-code"></i> Pegar texto</button>
            <button onclick="document.getElementById('file-series').click()"><i class="fa-solid fa-upload"></i> Subir archivo .m3u</button>
            <input type="file" id="file-series" accept=".m3u,.txt" style="display:none" onchange="leerArchivoM3U(this, 'series')">
        </div>
        <textarea id="m3u-series" class="m3u-textarea" placeholder="#EXTM3U&#10;#EXTINF:-1, The Last of Us - 1X01&#10;http://enlace.com/video.mp4"></textarea>
        <div class="import-buttons" style="margin-top: 5px;">
            <button onclick="procesarImportacionM3U('series')" style="background:var(--green)">▶ Iniciar importación</button>
            <button onclick="cerrarImportador('series')">Cancelar</button>
        </div>
        <div id="log-series" class="import-log"></div>
    </div>

    <div id="lista" class="grid"></div>
    <button class="btn-add-float" onclick="abrirModalAdd()">+</button>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 id="modal-title" style="text-align:center; color:var(--gold); margin-top:0;">EDITAR</h3>
        
        <div class="modal-group">
            <label>Título Base (Serie o Película)</label>
            <div style="display:flex; gap:8px;">
                <input type="text" id="edit-titulo" style="flex:1;" placeholder="Ej: Batman">
                <button type="button" style="background:var(--gold); border:none; padding:0 12px; border-radius:6px; cursor:pointer;" onclick="magiaInteligente()"><i class="fa-solid fa-wand-sparkles"></i></button>
            </div>
        </div>

        <div id="selector-portadas-container" style="display:none;">
            <label>Selecciona Portada:</label>
            <div class="poster-selector" id="poster-list"></div>
        </div>

        <div class="modal-group">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label>Logo 1 / Portada</label><input type="text" id="edit-logo1"></div>
                <div style="flex:1;" id="box-logo2"><label>Logo 2 (Deportes)</label><input type="text" id="edit-logo2"></div>
            </div>
        </div>

        <div style="display:flex; gap:10px;">
            <div class="modal-group" style="flex:1;"><label>Año / Horario</label><input type="text" id="edit-extra"></div>
            <div class="modal-group" style="flex:1;"><label>Género / Liga</label><input type="text" id="edit-genero"></div>
        </div>

        <div class="modal-group">
            <label>Sinopsis</label>
            <textarea id="edit-sinopsis" rows="3"></textarea>
        </div>

        <div class="modal-group">
            <label id="label-links">Capítulos / Enlaces</label>
            <div id="contenedor-links-modal"></div>
            <button id="btn-add-link-manual" onclick="agregarFilaLinkModal()" style="font-size:10px; background:#333; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer; margin-top:5px; width:100%;">+ Añadir enlace / capítulo</button>
        </div>

        <input type="hidden" id="edit-key"><input type="hidden" id="modal-mode">
        
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="cerrarModal()" style="flex:1; padding:12px; background:#444; border:none; color:white; border-radius:8px; cursor:pointer;">CANCELAR</button>
            <button onclick="procesarForm()" style="flex:1; padding:12px; background:var(--gold); border:none; font-weight:bold; border-radius:8px; cursor:pointer;">GUARDAR CAMBIOS</button>
        </div>
    </div>
</div>

<script>
    // Configuración Firebase
    const _db = "aHR0cHM6Ly9wbGF5ZXJ0di05NDQ5Yy1kZWZhdWx0LXJ0ZGIuZXVyb3BlLXdlc3QxLmZpcmViYXNlZGF0YWJhc2UuYXBwLw==";
    const _sh = "Y2thbGthMjI3NA==";
    const TMDB_KEY = "cbb1fa07c88626f5c57d56e48d8ce704"; // Tu clave TMDB fija

    firebase.initializeApp({ databaseURL: atob(_db) });
    const database = firebase.database();
    let catActual = 'peliculas';
    let rawData = {};

    // Variables para selección múltiple
    let seleccionMode = false;
    let selectedKeys = new Set();

    function verificarPass() {
        if(document.getElementById('pass-input').value === atob(_sh)) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            cambiarCat('peliculas');
        } else { alert("Acceso incorrecto"); }
    }

    function cambiarCat(cat) {
        // Limpiar selección al cambiar de categoría
        selectedKeys.clear();
        actualizarBarraSeleccion();
        
        database.ref(catActual).off();
        catActual = cat;
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + cat).classList.add('active');
        
        // Mostrar barra solo en películas
        const barra = document.getElementById('selection-bar');
        if (cat === 'peliculas') {
            barra.style.display = 'flex';
        } else {
            barra.style.display = 'none';
        }
        
        // NUEVO: Mostrar/ocultar importadores según categoría
        const importPelis = document.getElementById('import-pelis-section');
        const importSeries = document.getElementById('import-series-section');
        if (cat === 'peliculas') {
            importPelis.style.display = 'block';
            importSeries.style.display = 'none';
        } else if (cat === 'series') {
            importPelis.style.display = 'none';
            importSeries.style.display = 'block';
        } else {
            importPelis.style.display = 'none';
            importSeries.style.display = 'none';
        }
        
        database.ref(catActual).on('value', snap => { 
            rawData = snap.val() || {}; 
            renderizar(); 
        });
    }

    function getRoot(t) {
        if(!t) return "SIN TÍTULO";
        return t.split(/ S\d+| \d+X| CAPITULO| EPISODIO/i)[0].trim().toUpperCase();
    }

    function renderizar() {
        const listaDiv = document.getElementById('lista');
        listaDiv.innerHTML = "";
        const items = Object.keys(rawData).map(k => ({...rawData[k], firebaseKey: k}));
        
        const grupos = {};
        items.forEach(it => {
            let root = getRoot(it.titulo);
            if (!grupos[root]) grupos[root] = { ...it, principal: root, caps: [it] };
            else grupos[root].caps.push(it);
        });

        Object.values(grupos).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)).forEach(it => {
            let imgHTML = (it.logo2 && it.logo2.trim() !== "") 
                ? `<img class="img-dual" src="${it.logo1}"><b style="font-size:10px; color:var(--gold)">VS</b><img class="img-dual" src="${it.logo2}">`
                : `<img class="img-simple" src="${it.logo1 || it.portada || ''}">`;

            // Checkbox para selección múltiple (solo películas)
            let checkboxHtml = '';
            if (catActual === 'peliculas') {
                const peliKey = it.firebaseKey;
                const isChecked = selectedKeys.has(peliKey);
                checkboxHtml = `<input type="checkbox" class="card-checkbox" data-key="${peliKey}" ${isChecked ? 'checked' : ''}>`;
            }
            
            listaDiv.innerHTML += `
                <div class="card-container" data-root="${it.principal}">
                    ${checkboxHtml}
                    <div class="card-header">
                        <div class="img-wrapper">${imgHTML}</div>
                        <div class="card-info">
                            <h3>${it.principal}</h3>
                            <p>${it.extra || ''} • ${catActual === 'series' ? it.caps.length + ' Capítulos' : it.genero}</p>
                        </div>
                    </div>
                    <div class="action-btns">
                        <button class="mini-btn" style="background:var(--purple)" onclick="fijarDestacado('${it.firebaseKey}')"><i class="fa-solid fa-star"></i></button>
                        <button class="mini-btn" style="background:var(--blue)" onclick="${catActual === 'series' ? `abrirEditorSeries('${it.principal.replace(/'/g, "\\'")}')` : `abrirModalEdit('${it.firebaseKey}')`}"><i class="fa-solid fa-pen"></i></button>
                        <button class="mini-btn" style="background:var(--red)" onclick="eliminarGrupo('${it.principal.replace(/'/g, "\\'")}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
        });
        
        // Agregar event listeners a los checkboxes después de renderizar
        if (catActual === 'peliculas') {
            document.querySelectorAll('.card-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const key = cb.dataset.key;
                    if (cb.checked) selectedKeys.add(key);
                    else selectedKeys.delete(key);
                    actualizarBarraSeleccion();
                });
            });
        }
        
        // Actualizar estado del "seleccionar todos"
        const selectAllCheck = document.getElementById('select-all-checkbox');
        if (selectAllCheck) {
            const totalCheckboxes = document.querySelectorAll('.card-checkbox').length;
            const checkedCount = selectedKeys.size;
            selectAllCheck.checked = totalCheckboxes > 0 && checkedCount === totalCheckboxes;
            selectAllCheck.indeterminate = checkedCount > 0 && checkedCount < totalCheckboxes;
        }
    }

    function actualizarBarraSeleccion() {
        const count = selectedKeys.size;
        const btnDelete = document.getElementById('btn-delete-selected');
        const spanCount = document.getElementById('selected-count');
        if (btnDelete) {
            btnDelete.disabled = count === 0;
            btnDelete.innerText = count === 0 ? '🗑️ Eliminar seleccionadas' : `🗑️ Eliminar ${count} seleccionadas`;
        }
        if (spanCount) spanCount.innerText = `${count} seleccionada${count !== 1 ? 's' : ''}`;
    }

    async function eliminarSeleccionadas() {
        if (selectedKeys.size === 0) return;
        if (!confirm(`¿Eliminar ${selectedKeys.size} película(s) permanentemente?`)) return;
        
        const keysToDelete = Array.from(selectedKeys);
        let eliminados = 0;
        for (const key of keysToDelete) {
            try {
                await database.ref(`peliculas/${key}`).remove();
                eliminados++;
            } catch(e) { console.error(e); }
        }
        alert(`Se eliminaron ${eliminados} películas.`);
        selectedKeys.clear();
        actualizarBarraSeleccion();
        database.ref('peliculas').once('value', snap => { rawData = snap.val() || {}; renderizar(); });
    }

    // --- EDITOR DE SERIES (LÍNEA POR LÍNEA) ---
    function abrirEditorSeries(tituloRaiz) {
        resetModal();
        const caps = Object.keys(rawData)
            .map(k => ({...rawData[k], key: k}))
            .filter(it => getRoot(it.titulo) === tituloRaiz)
            .sort((a, b) => a.titulo.localeCompare(b.titulo, undefined, {numeric: true}));

        document.getElementById('modal-mode').value = "EDIT_SERIE";
        document.getElementById('modal-title').innerText = "GESTIONAR: " + tituloRaiz;
        document.getElementById('edit-titulo').value = tituloRaiz;
        
        if(caps.length > 0) {
            document.getElementById('edit-logo1').value = caps[0].logo1 || "";
            document.getElementById('edit-extra').value = caps[0].extra || "";
            document.getElementById('edit-genero').value = caps[0].genero || "";
            document.getElementById('edit-sinopsis').value = caps[0].sinopsis || "";
        }

        const contenedor = document.getElementById('contenedor-links-modal');
        contenedor.innerHTML = `<label style="color:var(--gold); font-size:10px; display:block; margin-bottom:10px;">CAPÍTULOS (EDITA Y SE GUARDA AL DAR AL BOTÓN INFERIOR)</label>`;
        
        caps.forEach(c => {
            const div = document.createElement('div');
            div.className = "fila-capitulo";
            div.innerHTML = `
                <input type="text" class="serie-cap-titulo" data-key="${c.key}" value="${c.titulo}">
                <input type="text" class="serie-cap-link" data-key="${c.key}" value="${c.link || ''}" placeholder="Link / AceStream">
                <button onclick="eliminarCapitulo('${c.key}', '${tituloRaiz}')" style="background:var(--red); border:none; color:white; border-radius:4px; cursor:pointer;"><i class="fa-solid fa-trash"></i></button>
            `;
            contenedor.appendChild(div);
        });

        const proximo = sugerirSiguiente(caps);
        const btnAdd = document.createElement('button');
        btnAdd.innerHTML = `<i class="fa-solid fa-plus"></i> Añadir ${proximo}`;
        btnAdd.style = "width:100%; padding:10px; background:var(--green); border:none; color:white; border-radius:8px; cursor:pointer; margin-top:10px; font-weight:bold;";
        btnAdd.onclick = () => añadirNuevoCapitulo(tituloRaiz, proximo, caps[0]);
        contenedor.appendChild(btnAdd);

        const btnTemp = document.createElement('button');
        btnTemp.innerHTML = `<i class="fa-solid fa-folder-plus"></i> Nueva Temporada (Póster)`;
        btnTemp.style = "width:100%; padding:8px; background:var(--blue); border:none; color:white; border-radius:8px; cursor:pointer; margin-top:5px; font-size:11px;";
        btnTemp.onclick = () => crearNuevaTemporada(tituloRaiz);
        contenedor.appendChild(btnTemp);

        document.getElementById('modal').style.display = "flex";
    }

    function sugerirSiguiente(caps) {
        if(caps.length === 0) return "S01 E01";
        const ultimo = caps[caps.length - 1].titulo;
        const match = ultimo.match(/S(\d+) E(\d+)/i);
        if(match) {
            return `S${match[1]} E${String(parseInt(match[2]) + 1).padStart(2, '0')}`;
        }
        return "S01 E01";
    }

    function añadirNuevoCapitulo(raiz, sugerencia, base) {
        const link = prompt(`Enlace para ${raiz} ${sugerencia}:`);
        if(!link) return;
        const nuevo = {...base, titulo: `${raiz} ${sugerencia}`, link: link.length === 40 ? "acestream://" + link : link, timestamp: Date.now()};
        delete nuevo.key;
        database.ref(catActual).push(nuevo).then(() => abrirEditorSeries(raiz));
    }

    function procesarForm() {
        const modo = document.getElementById('modal-mode').value;
        const logo1 = document.getElementById('edit-logo1').value.trim();
        const extra = document.getElementById('edit-extra').value.trim();
        const genero = document.getElementById('edit-genero').value.trim();
        const sinopsis = document.getElementById('edit-sinopsis').value.trim();

        if(modo === "EDIT_SERIE") {
            const updates = {};
            const raizActual = document.getElementById('modal-title').innerText.replace("GESTIONAR: ", "");
            
            Object.keys(rawData).forEach(k => {
                if(getRoot(rawData[k].titulo) === raizActual) {
                    updates[`${catActual}/${k}/logo1`] = logo1;
                    updates[`${catActual}/${k}/extra`] = extra;
                    updates[`${catActual}/${k}/genero`] = genero;
                    updates[`${catActual}/${k}/sinopsis`] = sinopsis;
                }
            });

            document.querySelectorAll('.serie-cap-titulo').forEach(inp => {
                const key = inp.dataset.key;
                updates[`${catActual}/${key}/titulo`] = inp.value.trim().toUpperCase();
            });
            document.querySelectorAll('.serie-cap-link').forEach(inp => {
                const key = inp.dataset.key;
                let v = inp.value.trim();
                if(v.length === 40 && !v.includes("://")) v = "acestream://" + v;
                updates[`${catActual}/${key}/link`] = v;
            });

            database.ref().update(updates).then(() => cerrarModal());

        } else {
            const titulo = document.getElementById('edit-titulo').value.trim().toUpperCase();
            const links = document.querySelectorAll('.link-input-modal');
            let d = { titulo, logo1, extra, genero, sinopsis, timestamp: Date.now() };
            if(catActual === 'directos' || catActual === 'agenda') d.logo2 = document.getElementById('edit-logo2').value;

            links.forEach((inp, i) => {
                let v = inp.value.trim();
                if(v.length === 40 && !v.includes("://")) v = "acestream://" + v;
                if(i === 0) d.link = v; else d['link'+i] = v;
            });

            const ref = (modo === "ADD") ? database.ref(catActual).push() : database.ref(catActual + "/" + document.getElementById('edit-key').value);
            ref.set(d).then(() => cerrarModal());
        }
    }

    async function magiaInteligente() {
        const titulo = document.getElementById('edit-titulo').value.trim();
        if(!titulo) return;
        const type = catActual === 'series' ? 'tv' : 'movie';
        try {
            const res = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${TMDB_KEY}&query=${encodeURIComponent(titulo)}&language=es-ES`).then(r => r.json());
            if(res.results && res.results.length > 0) {
                const det = await fetch(`https://api.themoviedb.org/3/${type}/${res.results[0].id}?api_key=${TMDB_KEY}&language=es-ES&append_to_response=images`).then(r => r.json());
                document.getElementById('edit-extra').value = (det.release_date || det.first_air_date || "").substring(0,4);
                document.getElementById('edit-sinopsis').value = det.overview || "";
                document.getElementById('edit-genero').value = det.genres ? det.genres.map(g => g.name).join(', ') : "";
                const pList = document.getElementById('poster-list');
                pList.innerHTML = "";
                document.getElementById('selector-portadas-container').style.display = "block";
                det.images.posters.slice(0, 8).forEach((p, idx) => {
                    const url = `https://image.tmdb.org/t/p/w500${p.file_path}`;
                    const img = document.createElement('img');
                    img.src = url; img.className = "poster-option" + (idx === 0 ? " selected" : "");
                    img.onclick = () => {
                        document.querySelectorAll('.poster-option').forEach(el => el.classList.remove('selected'));
                        img.classList.add('selected'); document.getElementById('edit-logo1').value = url;
                    };
                    pList.appendChild(img);
                    if(idx === 0) document.getElementById('edit-logo1').value = url;
                });
            }
        } catch(e) { console.error(e); }
    }

    function mostrarImportador(categoria) {

    function leerArchivoM3U(input, categoria) {
        if (!input.files || !input.files[0]) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const contenido = e.target.result;
            const textarea = document.getElementById(`m3u-${categoria}`);
            textarea.value = contenido;
            textarea.style.display = 'block';
            document.getElementById(`log-${categoria}`).style.display = 'block';
            document.getElementById(`log-${categoria}`).innerHTML = '';
        };
        reader.readAsText(input.files[0]);
        input.value = '';
    }

    // Limpiar título para búsqueda TMDB
    function limpiarTitulo(titulo) {
        let limpio = titulo;
        limpio = limpio.replace(/\.(mkv|mp4|avi|mov|wmv|flv|webm)$/i, '');
        limpio = limpio.replace(/\[[^\]]*\]|\([^\)]*\)/g, '');
        limpio = limpio.replace(/\b(1080p|720p|4K|480p|HDTV|WEB-DL|WEBRip|BluRay|x264|x265|HEVC|HDRip|BRRip|DVDRip|Rip)\b/gi, '');
        limpio = limpio.replace(/\b(19|20)\d{2}\b/g, '');
        limpio = limpio.replace(/[\.\_\-]+/g, ' ').trim();
        limpio = limpio.replace(/\s{2,}/g, ' ');
        return limpio;
    }

    // Buscar película en TMDB
    async function buscarPeliculaTMDB(titulo) {
        const clean = limpiarTitulo(titulo);
        const url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(clean)}&language=es`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.results && data.results[0]) {
                const peli = data.results[0];
                const poster = peli.poster_path ? `https://image.tmdb.org/t/p/w500${peli.poster_path}` : null;
                const año = peli.release_date ? peli.release_date.substring(0,4) : "";
                const sinopsis = peli.overview || "";
                return { poster, año, sinopsis, tituloOriginal: peli.title };
            }
        } catch(e) { console.warn(e); }
        return null;
    }

    // Buscar serie y su temporada específica en TMDB
    async function buscarSerieTMDB(nombre, temporada) {
        const clean = limpiarTitulo(nombre);
        const searchUrl = `https://api.themoviedb.org/3/search/tv?api_key=${TMDB_KEY}&query=${encodeURIComponent(clean)}&language=es`;
        try {
            const res = await fetch(searchUrl);
            const data = await res.json();
            if (data.results && data.results[0]) {
                const serieId = data.results[0].id;
                const detailUrl = `https://api.themoviedb.org/3/tv/${serieId}?api_key=${TMDB_KEY}&language=es`;
                const detailRes = await fetch(detailUrl);
                const det = await detailRes.json();
                let poster = null;
                if (det.seasons) {
                    const targetSeason = det.seasons.find(s => s.season_number === temporada);
                    if (targetSeason && targetSeason.poster_path) poster = `https://image.tmdb.org/t/p/w500${targetSeason.poster_path}`;
                    else if (det.poster_path) poster = `https://image.tmdb.org/t/p/w500${det.poster_path}`;
                }
                const año = det.first_air_date ? det.first_air_date.substring(0,4) : "";
                const sinopsis = det.overview || "";
                return { poster, año, sinopsis, tituloOriginal: det.name };
            }
        } catch(e) { console.warn(e); }
        return null;
    }

    // Parsear título de serie desde el M3U (reconoce "Nombre - 1X01", "Nombre 1x01", "Nombre S01E02")
    function parseTituloSerie(raw) {
        let nombre = raw;
        let temp = null;
        let episodio = null;
        // Patrones
        let match = raw.match(/^(.+?)\s*-\s*(\d{1,2})[Xx](\d{1,2})(?:\s+(.*))?$/);
        if (!match) match = raw.match(/^(.+?)\s+(\d{1,2})[Xx](\d{1,2})(?:\s+(.*))?$/);
        if (!match) match = raw.match(/^(.+?)\s+S(\d{1,2})E(\d{1,2})\s*(.*)$/i);
        if (match) {
            nombre = match[1].trim();
            temp = parseInt(match[2]);
            episodio = parseInt(match[3]);
        } else {
            // intentar solo "1x02"
            let x = raw.match(/(\d{1,2})[Xx](\d{1,2})/);
            if (x) {
                temp = parseInt(x[1]);
                episodio = parseInt(x[2]);
                nombre = raw.replace(/\d{1,2}[Xx]\d{1,2}/, '').trim();
            }
        }
        return { nombre, temp, episodio };
    }

    // Formatear título de serie al estilo "NOMBRE S01 E01"
    function formatearTituloSerie(parsed) {
        if (parsed.temp === null || parsed.episodio === null) return parsed.nombre.toUpperCase();
        let s = parsed.temp.toString().padStart(2, '0');
        let e = parsed.episodio.toString().padStart(2, '0');
        return `${parsed.nombre.toUpperCase()} S${s} E${e}`;
    }

    // Procesar importación M3U
    async function procesarImportacionM3U(categoria) {
        const m3uText = document.getElementById(`m3u-${categoria}`).value;
        if (!m3uText.trim()) {
            alert("Pega el contenido M3U primero.");
            return;
        }
        const logDiv = document.getElementById(`log-${categoria}`);
        logDiv.innerHTML = `<span style="color:#5dade2;">⏳ Procesando lista ${categoria}...</span><br>`;
        
        // Para películas: obtener títulos existentes y evitar duplicados
        let titulosExistentes = new Set();
        let subidosEnSesion = new Set();
        if (categoria === 'peliculas') {
            const snapshot = await database.ref('peliculas').once('value');
            const data = snapshot.val() || {};
            Object.values(data).forEach(item => {
                if (item.titulo) titulosExistentes.add(item.titulo.trim().toUpperCase());
            });
            logDiv.innerHTML += `<span style="color:#5dade2;">📋 ${titulosExistentes.size} películas ya registradas.</span><br>`;
        }
        
        const lineas = m3uText.split(/\r?\n/);
        let procesados = 0, errores = 0, duplicados = 0;
        
        for (let i = 0; i < lineas.length; i++) {
            const linea = lineas[i].trim();
            if (!linea.startsWith('#EXTINF')) continue;
            
            // Extraer título (después de la coma)
            let rawTitle = "";
            const comaPos = linea.indexOf(',');
            if (comaPos !== -1) rawTitle = linea.substring(comaPos + 1).trim();
            else rawTitle = linea.trim();
            
            // Obtener enlace (siguiente línea no vacía)
            let link = null;
            let next = i + 1;
            while (next < lineas.length && lineas[next].trim() === "") next++;
            if (next < lineas.length) {
                let candidate = lineas[next].trim();
                if (candidate.startsWith('http://') || candidate.startsWith('https://')) link = candidate;
            }
            if (!link) {
                logDiv.innerHTML += `<span style="color:#f44336;">⚠️ Saltando: sin URL para "${rawTitle.substring(0,50)}"</span><br>`;
                errores++;
                continue;
            }
            
            if (categoria === 'peliculas') {
                // Limpiar título para evitar duplicados
                let tituloLimpio = limpiarTitulo(rawTitle).toUpperCase();
                if (tituloLimpio.length < 2) tituloLimpio = rawTitle.toUpperCase();
                if (titulosExistentes.has(tituloLimpio) || subidosEnSesion.has(tituloLimpio)) {
                    logDiv.innerHTML += `<span style="color:#e67e22;">⏭️ Duplicado saltado: ${tituloLimpio}</span><br>`;
                    duplicados++;
                    continue;
                }
                // Obtener metadatos de TMDB
                let portada = "https://via.placeholder.com/500x750?text=No+Image";
                let año = "";
                let sinopsis = "";
                const tmdb = await buscarPeliculaTMDB(rawTitle);
                if (tmdb) {
                    if (tmdb.poster) portada = tmdb.poster;
                    if (tmdb.año) año = tmdb.año;
                    if (tmdb.sinopsis) sinopsis = tmdb.sinopsis;
                    logDiv.innerHTML += `<span style="color:#f1c40f;">🎬 TMDB: ${tmdb.tituloOriginal || rawTitle} (${año})</span><br>`;
                } else {
                    logDiv.innerHTML += `<span style="color:#5dade2;">🔍 No encontrada en TMDB: ${rawTitle.substring(0,40)}</span><br>`;
                }
                await new Promise(r => setTimeout(r, 150));
                const payload = {
                    titulo: tituloLimpio,
                    link: link,
                    portada: portada,
                    logo1: portada,
                    extra: año,
                    genero: "",
                    sinopsis: sinopsis,
                    timestamp: Date.now(),
                    categoria: "PELICULAS"
                };
                await database.ref('peliculas').push(payload);
                procesados++;
                subidosEnSesion.add(tituloLimpio);
                logDiv.innerHTML += `<span style="color:#2ecc71;">✅ ${tituloLimpio}</span><br>`;
            } 
            else if (categoria === 'series') {
                const parsed = parseTituloSerie(rawTitle);
                const tituloFinal = formatearTituloSerie(parsed);
                let portada = "https://via.placeholder.com/500x750?text=No+Image";
                let año = "";
                let sinopsis = "";
                if (parsed.nombre && parsed.temp !== null) {
                    const tmdb = await buscarSerieTMDB(parsed.nombre, parsed.temp);
                    if (tmdb) {
                        if (tmdb.poster) portada = tmdb.poster;
                        if (tmdb.año) año = tmdb.año;
                        if (tmdb.sinopsis) sinopsis = tmdb.sinopsis;
                        logDiv.innerHTML += `<span style="color:#f1c40f;">📺 TMDB: ${tmdb.tituloOriginal || parsed.nombre} (T${parsed.temp})</span><br>`;
                    } else {
                        logDiv.innerHTML += `<span style="color:#5dade2;">🔍 Serie no encontrada: ${parsed.nombre}</span><br>`;
                    }
                    await new Promise(r => setTimeout(r, 150));
                }
                const payload = {
                    titulo: tituloFinal,
                    link: link,
                    portada: portada,
                    logo1: portada,
                    extra: año,
                    genero: "",
                    sinopsis: sinopsis,
                    timestamp: Date.now(),
                    categoria: "SERIES"
                };
                await database.ref('series').push(payload);
                procesados++;
                logDiv.innerHTML += `<span style="color:#2ecc71;">✅ ${tituloFinal}</span><br>`;
            }
            logDiv.scrollTop = logDiv.scrollHeight;
            await new Promise(r => setTimeout(r, 60));
        }
        logDiv.innerHTML += `<hr><span style="color:#2ecc71;">✨ Importación finalizada. Procesados: ${procesados} | Errores: ${errores} | Duplicados omitidos: ${duplicados}</span>`;
        if (procesados > 0) {
            database.ref(categoria).once('value', snap => { rawData = snap.val() || {}; renderizar(); });
        }
    }
