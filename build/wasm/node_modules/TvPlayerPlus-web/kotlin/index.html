<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tv Player+</title>
    <!-- Cargamos TDLib desde un CDN ultra-rápido y estable -->
    <script src="https://cdn.jsdelivr.net/npm/tdweb/dist/tdweb.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ComposeTarget { width: 100vw; height: 100vh; display: block; position: absolute; top: 0; left: 0; }
        #loading-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; }
        .loader { border: 3px solid rgba(255, 255, 255, 0.1); width: 60px; height: 60px; border-radius: 50%; border-left-color: #E50914; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .logo-main { font-size: 3.5rem; font-weight: 900; color: #E50914; margin-top: 25px; text-transform: uppercase; letter-spacing: -2px; }
    </style>
</head>
<body>
    <div id="loading-layer">
        <div class="loader"></div>
        <h1 class="logo-main">Tv Player+</h1>
        <p id="status-msg" style="color: #444; margin-top: 20px; font-weight: 500;">Iniciando protocolos...</p>
    </div>

    <canvas id="ComposeTarget"></canvas>

    <script src="web.js"></script>

    <script>
        // Funciones de utilidad para la comunicación con Kotlin/Wasm
        window.getTdType = function(obj) { return (obj && obj['@type']) ? obj['@type'] : ''; };
        window.getAuthState = function(update) {
            return (update && update.authorization_state && update.authorization_state['@type']) ? update.authorization_state['@type'] : '';
        };

        window.createClient = function(options) {
            console.log("WEB: Intentando instanciar TDLib...");
            // Buscamos el constructor en todos los namespaces posibles de la librería
            const TdConstructor = window.tdweb || window.TdWeb || (window.tdweb && window.tdweb.TdClient);

            if (!TdConstructor) {
                console.error("WEB: Error crítico - Librería no encontrada en window");
                document.getElementById('status-msg').style.color = "#E50914";
                document.getElementById('status-msg').innerText = "Error: Librería de Telegram bloqueada o no cargada.";
                return null;
            }

            try {
                const instance = new TdConstructor(options);
                console.log("WEB: Cliente TDLib listo.");
                return instance;
            } catch (e) {
                console.error("WEB: Error al crear instancia:", e);
                return null;
            }
        };

        window.hideBootScreen = function() {
            const layer = document.getElementById('loading-layer');
            if (layer) layer.style.display = 'none';
        };

        // Si en 5 segundos no ha cargado, intentamos forzar un mensaje de ayuda
        setTimeout(() => {
            const msg = document.getElementById('status-msg');
            if (msg && msg.innerText.includes("Iniciando")) {
                msg.innerText = "Sincronizando con los servidores de Telegram...";
            }
        }, 5000);
    </script>
</body>
</html>
