<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Player TV - Admin Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f0f14;
    color:white;
}

header {
    padding:20px;
    background:#1a1a22;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

h1 { margin:0; font-size:20px; }

.container {
    padding:20px;
    display:grid;
    grid-template-columns: 300px 1fr;
    gap:20px;
}

.panel {
    background:#1a1a22;
    padding:15px;
    border-radius:10px;
}

input, select {
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:6px;
    background:#2a2a35;
    color:white;
}

button {
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#e50914;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover {
    background:#ff1b2d;
}

.item {
    background:#222;
    padding:10px;
    margin:5px 0;
    border-radius:6px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

small { opacity:0.7; }

.delete {
    background:#333;
    padding:5px 10px;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <h1>🎬 Player TV - PANEL ADMIN</h1>
    <button onclick="logout()">Salir</button>
</header>

<div class="container">

<!-- FORM -->
<div class="panel">
    <h3>➕ Añadir contenido</h3>

    <select id="categoria">
        <option value="peliculas">Películas</option>
        <option value="series">Series</option>
        <option value="mundial">Mundial</option>
        <option value="agenda">Agenda</option>
    </select>

    <input id="titulo" placeholder="Título">
    <input id="sinopsis" placeholder="Sinopsis">
    <input id="portada" placeholder="URL Portada">
    <input id="link" placeholder="Link vídeo / m3u8">

    <button onclick="guardar()">Guardar</button>
</div>

<!-- LISTA -->
<div class="panel">
    <h3>📦 Contenido</h3>
    <div id="lista"></div>
</div>

</div>

<script>
/* ================= FIREBASE ================= */

const _db = "aHR0cHM6Ly9wbGF5ZXJ0di05NDQ5Yy1kZWZhdWx0LXJ0ZGIuZXVyb3BlLXdlc3QxLmZpcmViYXNlZGF0YWJhc2UuYXBwLw==";

firebase.initializeApp({
    databaseURL: atob(_db)
});

const db = firebase.database();

/* ================= GUARDAR ================= */

function guardar() {

    const cat = document.getElementById("categoria").value;

    const data = {
        titulo: document.getElementById("titulo").value,
        sinopsis: document.getElementById("sinopsis").value,
        portada: document.getElementById("portada").value,
        link: document.getElementById("link").value
    };

    db.ref(cat).push(data);

    alert("Guardado ✔");

    cargar();
}

/* ================= CARGAR ================= */

function cargar() {

    const cont = document.getElementById("lista");
    cont.innerHTML = "";

    ["peliculas","series","mundial","agenda"].forEach(cat => {

        db.ref(cat).on("value", snap => {

            const data = snap.val() || {};

            Object.keys(data).forEach(key => {

                const item = data[key];

                const div = document.createElement("div");
                div.className = "item";

                div.innerHTML = `
                    <div>
                        <strong>${item.titulo}</strong><br>
                        <small>${cat}</small>
                    </div>
                    <div class="delete" onclick="borrar('${cat}','${key}')">X</div>
                `;

                cont.appendChild(div);
            });

        });

    });
}

/* ================= BORRAR ================= */

function borrar(cat, key) {
    db.ref(cat + "/" + key).remove();
    cargar();
}

/* ================= LOGOUT ================= */

function logout() {
    location.reload();
}

/* INIT */
cargar();

</script>

</body>
</html>
