<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Player TV</title>
    <!-- Fuente e iconos como en tu Player TV -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- GramJS -->
    <script src="https://cdn.jsdelivr.net/npm/telegram@2.26.6/lib/gramjs.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app-container {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: #141414;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .app-header {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 18px 24px;
            border-bottom: 1px solid rgba(245,197,24,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg,#f5c518,#d4a017);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .status-badge {
            background: #2c2c2c;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 8px; height: 8px;
            background: #4caf50;
            border-radius: 50%;
            box-shadow: 0 0 5px #4caf50;
        }
        .login-zone {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: #1e1e1e;
            padding: 35px;
            border-radius: 28px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid #333;
        }
        .login-card h2 {
            color: #f5c518;
            margin-bottom: 25px;
        }
        .login-card input {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
        }
        .login-card button {
            width: 100%;
            background: #f5c518;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
        }
        .main-panel {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .chats-sidebar {
            width: 320px;
            background: #0e0e0e;
            border-right: 1px solid #2a2a2a;
            overflow-y: auto;
        }
        .chats-header {
            padding: 15px 20px;
            font-weight: 600;
            border-bottom: 1px solid #252525;
            color: #f5c518;
        }
        .chat-item {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid #1e1e1e;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-item:hover {
            background: #202020;
        }
        .chat-avatar {
            width: 48px;
            height: 48px;
            background: #2c2c2c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #f5c518;
        }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; margin-bottom: 4px; }
        .chat-last-msg { font-size: 0.7rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .messages-area { flex: 1; display: flex; flex-direction: column; background: #101010; }
        .chat-header-detail { padding: 15px 25px; background: #0a0a0a; border-bottom: 1px solid #262626; font-weight: 700; display: flex; align-items: center; gap: 12px; }
        .messages-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message-bubble { max-width: 75%; padding: 10px 16px; border-radius: 22px; background: #262626; align-self: flex-start; word-wrap: break-word; }
        .message-bubble.outgoing { background: #f5c518; color: #0a0a0a; align-self: flex-end; }
        .message-text { font-size: 0.9rem; line-height: 1.4; }
        .message-meta { font-size: 0.65rem; margin-top: 5px; opacity: 0.7; text-align: right; }
        .input-message { padding: 15px 20px; background: #0a0a0a; border-top: 1px solid #262626; display: flex; gap: 12px; }
        .input-message input { flex: 1; background: #2a2a2a; border: none; padding: 12px 18px; border-radius: 60px; color: white; outline: none; }
        .input-message button { background: #f5c518; border: none; width: 45px; border-radius: 60px; cursor: pointer; }
        .empty-chat { display: flex; justify-content: center; align-items: center; height: 100%; color: #666; flex-direction: column; gap: 12px; }
        .loading-placeholder { padding: 20px; text-align: center; color: #888; }
        .hide { display: none !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #f5c518; border-radius: 5px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <div class="logo"><h1><i class="fab fa-telegram"></i> Player TV</h1></div>
        <div class="status-badge"><span class="status-dot"></span> <span id="connectionStatus">Inicializando...</span></div>
    </div>
    <div id="loginZone" class="login-zone">
        <div class="login-card">
            <h2>Iniciar sesión</h2>
            <input type="tel" id="phoneInput" placeholder="+34 666 111 222" autocomplete="off">
            <div id="codeContainer" style="display:none;"><input type="text" id="codeInput" placeholder="Código de verificación"></div>
            <button id="authButton">Enviar número</button>
        </div>
    </div>
    <div id="mainApp" class="main-panel hide">
        <div class="chats-sidebar"><div class="chats-header"><i class="fa-regular fa-message"></i> CANALES Y GRUPOS</div><div id="chatsListContainer"><div class="loading-placeholder">Cargando...</div></div></div>
        <div class="messages-area">
            <div class="chat-header-detail" id="currentChatTitle"><i class="fa-regular fa-comment"></i> <span>Selecciona un chat</span></div>
            <div id="messagesList" class="messages-list"><div class="empty-chat"><i class="fa-regular fa-comment-dots"></i><p>Elige un canal o grupo</p></div></div>
            <div class="input-message" id="inputMessageContainer" style="display: none;"><input type="text" id="messageInput" placeholder="Mensaje..."><button id="sendMessageBtn"><i class="fa-regular fa-paper-plane"></i></button></div>
        </div>
    </div>
</div>

<script>
    // ================= CONFIGURACIÓN =================
    // 🔴 REEMPLAZA CON TUS DATOS DE my.telegram.org
    const API_ID = 8952741;          // <--- TU API ID (número)
    const API_HASH = "693fb2da124662dad85b2b337c53a386"; // <--- TU API HASH (cadena)
    // =================================================

    let client = null;
    let currentChatId = null;
    let chatsMap = new Map();
    let phoneCodeHash = null;

    // DOM elements
    const loginZone = document.getElementById('loginZone');
    const mainApp = document.getElementById('mainApp');
    const phoneInput = document.getElementById('phoneInput');
    const codeContainer = document.getElementById('codeContainer');
    const codeInput = document.getElementById('codeInput');
    const authButton = document.getElementById('authButton');
    const connectionStatus = document.getElementById('connectionStatus');
    const chatsListContainer = document.getElementById('chatsListContainer');
    const messagesList = document.getElementById('messagesList');
    const currentChatTitleSpan = document.querySelector('#currentChatTitle span');
    const inputMessageContainer = document.getElementById('inputMessageContainer');
    const messageInput = document.getElementById('messageInput');
    const sendMessageBtn = document.getElementById('sendMessageBtn');

    function updateStatus(msg, isError = false) {
        connectionStatus.innerHTML = msg;
        if (isError) console.error(msg);
    }

    // Inicializar GramJS
    async function initGramJS() {
        updateStatus("Conectando con GramJS...");
        const { TelegramClient, Api } = gramjs;
        const StringSession = gramjs.StringSession;
        
        client = new TelegramClient(new StringSession(""), API_ID, API_HASH, { connectionRetries: 5 });
        
        // Manejador de actualizaciones (nuevos mensajes)
        client.addEventHandler(async (update) => {
            if (update.className === 'UpdateNewMessage') {
                const msg = update.message;
                if (currentChatId && msg.peerId.className === 'PeerChannel' && msg.peerId.channelId == currentChatId) {
                    appendMessageGramJS(msg);
                }
                refreshChatsList(); // actualiza último mensaje
            }
        });
        
        await client.start({
            phoneNumber: async () => {
                return new Promise(resolve => {
                    const check = setInterval(() => {
                        const val = phoneInput.value.trim();
                        if (val && authButton.innerText !== "Verificar código") {
                            clearInterval(check);
                            resolve(val);
                        }
                    }, 200);
                });
            },
            password: async () => prompt("Introduce tu contraseña de 2FA:"),
            phoneCode: async () => {
                return new Promise(resolve => {
                    const check = setInterval(() => {
                        const code = codeInput.value.trim();
                        if (code) {
                            clearInterval(check);
                            resolve(code);
                        }
                    }, 200);
                });
            },
            onError: (err) => {
                console.error(err);
                updateStatus("Error: " + err.message, true);
                alert("Error: " + err.message);
            }
        });
        
        updateStatus("Conectado");
        loginZone.classList.add('hide');
        mainApp.classList.remove('hide');
        await refreshChatsList();
    }
    
    // Obtener lista de diálogos (chats)
    async function refreshChatsList() {
        if (!client) return;
        chatsListContainer.innerHTML = '<div class="loading-placeholder">Cargando chats...</div>';
        try {
            const dialogs = await client.getDialogs({ limit: 100 });
            if (dialogs.length === 0) {
                chatsListContainer.innerHTML = '<div class="loading-placeholder">No hay chats aún</div>';
                return;
            }
            let html = '';
            for (const dialog of dialogs) {
                const id = dialog.id;
                const title = dialog.title || "Sin título";
                const lastMsg = dialog.message?.message || "";
                chatsMap.set(id, dialog);
                html += `
                    <div class="chat-item" data-chat-id="${id}">
                        <div class="chat-avatar"><i class="fa-solid fa-users"></i></div>
                        <div class="chat-info">
                            <div class="chat-name">${escapeHtml(title)}</div>
                            <div class="chat-last-msg">${escapeHtml(lastMsg.substring(0, 50))}</div>
                        </div>
                    </div>
                `;
            }
            chatsListContainer.innerHTML = html;
            document.querySelectorAll('.chat-item').forEach(el => {
                el.addEventListener('click', () => {
                    const chatId = parseInt(el.getAttribute('data-chat-id'));
                    openChatGramJS(chatId);
                });
            });
        } catch(e) {
            console.error(e);
            chatsListContainer.innerHTML = '<div class="loading-placeholder">Error al cargar</div>';
        }
    }
    
    async function openChatGramJS(chatId) {
        currentChatId = chatId;
        const dialog = chatsMap.get(chatId);
        const title = dialog ? dialog.title : 'Chat';
        currentChatTitleSpan.innerText = title;
        inputMessageContainer.style.display = 'flex';
        messagesList.innerHTML = '<div class="loading-placeholder">Cargando mensajes...</div>';
        
        try {
            const history = await client.getMessages(chatId, { limit: 50 });
            messagesList.innerHTML = '';
            if (history.length === 0) {
                messagesList.innerHTML = '<div class="empty-chat"><i class="fa-regular fa-comment"></i><p>No hay mensajes</p></div>';
            } else {
                history.reverse().forEach(msg => appendMessageGramJS(msg));
            }
        } catch(e) {
            messagesList.innerHTML = '<div class="empty-chat">Error al cargar historial</div>';
        }
    }
    
    function appendMessageGramJS(msg) {
        const isOut = msg.out;
        let text = msg.message || "[Mensaje no texto]";
        const date = new Date(msg.date * 1000);
        const timeStr = date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        const msgDiv = document.createElement('div');
        msgDiv.className = `message-bubble ${isOut ? 'outgoing' : ''}`;
        msgDiv.innerHTML = `<div class="message-text">${escapeHtml(text)}</div><div class="message-meta">${timeStr}</div>`;
        messagesList.appendChild(msgDiv);
        messagesList.scrollTop = messagesList.scrollHeight;
    }
    
    async function sendCurrentMessage() {
        if (!currentChatId || !client) return;
        const text = messageInput.value.trim();
        if (!text) return;
        messageInput.value = '';
        try {
            await client.sendMessage(currentChatId, { message: text });
        } catch(e) { console.error(e); }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Control de la UI de login (intercepta el click)
    authButton.addEventListener('click', () => {
        if (authButton.innerText === "Enviar número") {
            // Mostrar campo de código
            codeContainer.style.display = 'block';
            authButton.innerText = "Verificar código";
            // Iniciar cliente (esto lanzará la autenticación)
            initGramJS().catch(err => {
                alert("Error: " + err.message);
                updateStatus("Error", true);
            });
        } else {
            // Ya se está esperando el código, el cliente lo capturará solo
            // Solo notificamos que se ingresó
            updateStatus("Código ingresado, verificando...");
        }
    });
    
    sendMessageBtn.addEventListener('click', sendCurrentMessage);
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendCurrentMessage(); });
    
    // Mostrar interfaz inicial
    updateStatus("Listo. Introduce tu número.");
</script>
</body>
</html>
