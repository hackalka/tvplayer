<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cliente Telegram</title>
    <!-- Estilos básicos para que se vea ordenado -->
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        #app {
            background: #1e1e1e;
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        pre {
            background: #2a2a2a;
            padding: 12px;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 12px;
            color: #f5c518;
        }
        .log {
            background: #0a0a0a;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            margin-bottom: 16px;
            border-left: 3px solid #f5c518;
        }
        button {
            background: #f5c518;
            color: #000;
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        button:active { transform: scale(0.98); }
        input {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 40px;
            padding: 10px 16px;
            color: white;
            width: 100%;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div id="app">
    <h2>🔐 Cliente Telegram</h2>
    <div class="log" id="log">Cargando...</div>

    <!-- Step 1: Phone number -->
    <div id="stepPhone">
        <input type="tel" id="phone" placeholder="+34600123456" value="+34">
        <button id="btnPhone">Enviar número</button>
    </div>

    <!-- Step 2: OTP (solo si hace falta) -->
    <div id="stepCode" class="hidden">
        <input type="text" id="code" placeholder="Código de verificación">
        <button id="btnCode">Verificar</button>
    </div>

    <!-- Step 3: 2FA (solo si hace falta) -->
    <div id="step2fa" class="hidden">
        <input type="password" id="password" placeholder="Contraseña de dos pasos">
        <button id="btn2fa">Enviar contraseña</button>
    </div>

    <!-- Resultados -->
    <div id="result" class="hidden">
        <pre id="resultText"></pre>
        <button id="reset">Cerrar sesión y volver</button>
    </div>
</div>

<!-- Cargar GramJS desde Skypack CDN -->
<script type="module">
    import { TelegramClient } from 'https://cdn.skypack.dev/telegram';

    // 🔴 CAMBIA AQUÍ TUS CREDENCIALES
    const API_ID = 8952741;          // <-- TU API ID (número entero)
    const API_HASH = "693fb2da124662dad85b2b337c53a386";   // <-- TU API HASH (string)

    // Elementos del DOM
    const logDiv = document.getElementById('log');
    const stepPhoneDiv = document.getElementById('stepPhone');
    const stepCodeDiv = document.getElementById('stepCode');
    const step2faDiv = document.getElementById('step2fa');
    const resultDiv = document.getElementById('result');
    const resultText = document.getElementById('resultText');
    const resetBtn = document.getElementById('reset');

    let client = null;
    let currentPhoneNumber = null;

    function log(msg) {
        const timestamp = new Date().toLocaleTimeString();
        logDiv.innerHTML += `[${timestamp}] ${msg}\n`;
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(msg);
    }

    // Función para ocultar/mostrar pasos
    function setStep(step) {
        stepPhoneDiv.classList.add('hidden');
        stepCodeDiv.classList.add('hidden');
        step2faDiv.classList.add('hidden');
        if (step === 'phone') stepPhoneDiv.classList.remove('hidden');
        if (step === 'code') stepCodeDiv.classList.remove('hidden');
        if (step === '2fa') step2faDiv.classList.remove('hidden');
    }

    // Inicialización del cliente
    async function startClient() {
        if (client) {
            log("Cliente ya iniciado, cerrando sesión anterior...");
            try { await client.disconnect(); } catch (e) {}
        }
        log("Creando nuevo cliente Telegram...");
        client = new TelegramClient(new (await import('https://cdn.skypack.dev/telegram/sessions')).StringSession(""), API_ID, API_HASH, { connectionRetries: 5 });
        log("Cliente creado.");
    }

    // Envío del número de teléfono
    document.getElementById('btnPhone').onclick = async () => {
        const phone = document.getElementById('phone').value.trim();
        if (!phone) {
            log("❌ Introduce un número válido (con código país).");
            return;
        }
        currentPhoneNumber = phone;
        log(`📞 Número ingresado: ${phone}`);
        await startClient();
        log("Solicitando código...");
        try {
            await client.start({
                phoneNumber: async () => currentPhoneNumber,
                password: async () => {
                    log("⚠️ Se requiere contraseña de 2FA");
                    setStep('2fa');
                    return new Promise(resolve => {
                        const send2fa = async () => {
                            const pwd = document.getElementById('password').value;
                            if (pwd) {
                                document.getElementById('btn2fa').removeEventListener('click', send2fa);
                                resolve(pwd);
                            }
                        };
                        document.getElementById('btn2fa').onclick = send2fa;
                    });
                },
                phoneCode: async () => {
                    log("📨 Esperando código de verificación...");
                    setStep('code');
                    return new Promise(resolve => {
                        const sendCode = async () => {
                            const code = document.getElementById('code').value;
                            if (code) {
                                document.getElementById('btnCode').removeEventListener('click', sendCode);
                                resolve(code);
                            }
                        };
                        document.getElementById('btnCode').onclick = sendCode;
                    });
                },
                onError: (err) => {
                    log(`❌ Error: ${err.message}`);
                }
            });
            log("✅ Autenticación exitosa!");
            const me = await client.getMe();
            log(`👤 Bienvenido, ${me.firstName} ${me.lastName || ''} (${me.username || 'sin usuario'})`);
            log("Obteniendo lista de chats...");
            const dialogs = await client.getDialogs({ limit: 10 });
            resultText.innerText = `📋 Primeros 10 chats:\n${dialogs.map(d => `- ${d.title} (ID: ${d.id})`).join('\n')}`;
            stepPhoneDiv.classList.add('hidden');
            stepCodeDiv.classList.add('hidden');
            step2faDiv.classList.add('hidden');
            resultDiv.classList.remove('hidden');
        } catch (err) {
            log(`❌ Falló la autenticación: ${err.message}`);
            // Si falla, reiniciamos el cliente
            client = null;
            setStep('phone');
        }
    };

    resetBtn.onclick = async () => {
        if (client) {
            try { await client.disconnect(); } catch(e) {}
            client = null;
        }
        document.getElementById('phone').value = '+34';
        document.getElementById('code').value = '';
        document.getElementById('password').value = '';
        setStep('phone');
        resultDiv.classList.add('hidden');
        log("🔄 Sesión cerrada. Puedes volver a intentarlo.");
    };

    log("✅ Script cargado. Introduce tu número de teléfono.");
</script>
</body>
</html>
