<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Telegram Client - Definitivo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- Cargar tdweb local -->
    <script src="https://cdn.jsdelivr.net/npm/@sayyid2112/tdweb@1.8.45/dist/tdweb.min.js"></script>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <div class="logo"><h1><i class="fab fa-telegram"></i> TV Player</h1></div>
        <div class="status-badge"><span class="status-dot"></span> <span id="connectionStatus">Inicializando...</span></div>
    </div>
    <div id="loginZone" class="login-zone">
        <div class="login-card">
            <h2>Iniciar sesión</h2>
            <input type="tel" id="phoneInput" placeholder="+34 666 111 222" autocomplete="off">
            <div id="codeContainer" style="display:none;"><input type="text" id="codeInput" placeholder="Código de verificación"></div>
            <button id="authButton">Enviar número</button>
        </div>
    </div>
    <div id="mainApp" class="main-panel hide">
        <div class="chats-sidebar">
            <div class="chats-header">MIS GRUPOS Y CANALES</div>
            <div id="chatsListContainer"><div class="loading-placeholder">Cargando...</div></div>
        </div>
        <div class="messages-area">
            <div class="chat-header-detail" id="currentChatTitle">Selecciona un chat</div>
            <div id="messagesList" class="messages-list"><div class="empty-chat"><i class="fa-regular fa-comment-dots"></i><p>Elige un canal o grupo</p></div></div>
            <div class="input-message" id="inputMessageContainer" style="display:none;"><input type="text" id="messageInput" placeholder="Mensaje..."><button id="sendMessageBtn"><i class="fa-regular fa-paper-plane"></i></button></div>
        </div>
    </div>
</div>
<script src="js/telegram.js"></script>
</body>
</html>
