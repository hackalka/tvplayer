<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tv Player+</title>

    <!-- Cargamos una versión específica y estable de TDWeb -->
    <script src="https://cdn.jsdelivr.net/npm/tdweb@1.1.0/dist/tdweb.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); width: 48px; height: 48px; border-radius: 50%; border-left-color: #E50914; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .logo { font-size: 2.5rem; font-weight: 900; color: #E50914; margin: 0; letter-spacing: -1px; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <h1 class="logo">Tv Player+</h1>
        <p id="status-text" style="color: #71717a; margin-top: 15px; font-size: 0.9rem;">Iniciando motor de Telegram...</p>
    </div>

    <canvas id="ComposeTarget"></canvas>

    <!-- Cargamos el script de la app -->
    <script src="web.js"></script>

    <script>
        window.getTdType = function(obj) { return obj && obj['@type'] ? obj['@type'] : ''; };
        window.getAuthState = function(update) {
            return update && update.authorization_state && update.authorization_state['@type'] ? update.authorization_state['@type'] : '';
        };

        window.createClient = function(options) {
            console.log('Intentando crear cliente TDWeb...');
            try {
                // El constructor suele estar en window.tdweb o window.TdWeb
                const Constructor = window.tdweb || window.TdWeb;
                if (typeof Constructor === 'function' || typeof Constructor === 'object') {
                    const client = new Constructor(options);
                    console.log('Cliente creado con éxito');
                    return client;
                }
                console.error('Librería tdweb no encontrada en window');
                return null;
            } catch(e) {
                console.error('Error fatal al crear cliente:', e);
                return null;
            }
        };

        window.hideLoadingScreen = function() {
            const screen = document.getElementById('loading-screen');
            if (screen) screen.style.display = 'none';
        };
    </script>
</body>
</html>
